<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위바위보 게임</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    transition: background 0.3s, color 0.3s;
    background: #f4f4f4;
    color: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  body.dark {
    background: #222;
    color: #f4f4f4;
  }

  .top-buttons {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
  }

  button {
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
  }

  .game-buttons button {
    margin: 5px;
    font-size: 18px;
  }

  #scoreboard {
    margin-top: 20px;
    font-size: 18px;
  }

  #result {
    margin-top: 20px;
    font-size: 22px;
    min-height: 40px;
  }

  .celebration {
    animation: fireworks 1s ease-in-out infinite;
    color: gold;
    font-weight: bold;
  }

  @keyframes fireworks {
    0% {transform: scale(1);}
    50% {transform: scale(1.5);}
    100% {transform: scale(1);}
  }

  #chartContainer {
    width: 90%;
    max-width: 600px;
    margin-top: 30px;
  }

  table {
    border-collapse: collapse;
    margin-top: 10px;
    width: 300px;
  }

  th, td {
    border: 1px solid #333;
    padding: 5px;
    text-align: center;
  }

  body.dark table, body.dark th, body.dark td {
    border: 1px solid #f4f4f4;
  }
</style>
</head>
<body>
<div class="top-buttons">
  <button id="darkModeBtn">다크 모드</button>
  <button id="statsBtn">승률 테이블</button>
</div>

<h1>가위 바위 보 게임</h1>

<div class="game-buttons">
  <button onclick="play('가위')">가위</button>
  <button onclick="play('바위')">바위</button>
  <button onclick="play('보')">보</button>
</div>

<div id="scoreboard">
  당신: 0 | 컴퓨터: 0
</div>

<div id="result"></div>

<div id="chartContainer">
  <canvas id="winChart"></canvas>
</div>

<div id="statsTable" style="display:none">
  <table>
    <thead>
      <tr>
        <th>라운드</th>
        <th>승</th>
        <th>패</th>
        <th>무승부</th>
        <th>승률(%)</th>
      </tr>
    </thead>
    <tbody id="statsBody">
    </tbody>
  </table>
</div>

<script>
let userScore = 0;
let computerScore = 0;
let rounds = 0;
let winHistory = [];

const chartCtx = document.getElementById('winChart').getContext('2d');
const winChart = new Chart(chartCtx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: '승률 (%)',
      data: [],
      borderColor: 'blue',
      backgroundColor: 'rgba(0,0,255,0.2)',
      tension: 0.3
    }]
  },
  options: {
    scales: {
      y: { min: 0, max: 100 }
    }
  }
});

function play(userChoice) {
  const choices = ['가위', '바위', '보'];
  const computerChoice = choices[Math.floor(Math.random() * 3)];

  let resultText = '';
  rounds++;

  if(userChoice === computerChoice){
    resultText = `무승부! 당신과 컴퓨터 모두 ${userChoice}`;
    winHistory.push({win: 0, lose: 0, tie: 1});
  } else if(
    (userChoice === '가위' && computerChoice === '보') ||
    (userChoice === '바위' && computerChoice === '가위') ||
    (userChoice === '보' && computerChoice === '바위')
  ){
    userScore++;
    resultText = `축하합니다! ${userChoice}로 이겼습니다 🎉`;
    winHistory.push({win: 1, lose: 0, tie: 0});
    resultText = `<span class="celebration">${resultText}</span>`;
  } else {
    computerScore++;
    resultText = `아쉽습니다 ${computerChoice}에게 졌습니다`;
    winHistory.push({win: 0, lose: 1, tie: 0});
  }

  document.getElementById('scoreboard').textContent = `당신: ${userScore} | 컴퓨터: ${computerScore}`;
  document.getElementById('result').innerHTML = resultText;

  updateChart();
  updateStatsTable();

  if(userScore === 3 || computerScore === 3){
    setTimeout(() => {
      if(userScore === 3){
        alert('게임 승리! 다시 도전해보세요');
      } else {
        alert('게임 패배! 다음에는 이길 수 있어요');
      }
      resetGame();
    }, 500);
  }
}

function resetGame(){
  userScore = 0;
  computerScore = 0;
  rounds = 0;
  winHistory = [];
  document.getElementById('scoreboard').textContent = `당신: 0 | 컴퓨터: 0`;
  document.getElementById('result').innerHTML = '';
  winChart.data.labels = [];
  winChart.data.datasets[0].data = [];
  winChart.update();
  updateStatsTable();
}

function updateChart(){
  const totalRounds = winHistory.length;
  let wins = 0;
  const labels = [];
  const data = [];
  winHistory.forEach((h, index) => {
    wins += h.win;
    const winRate = Math.round((wins / (index + 1)) * 100);
    labels.push(index + 1);
    data.push(winRate);
  });
  winChart.data.labels = labels;
  winChart.data.datasets[0].data = data;
  winChart.update();
}

document.getElementById('darkModeBtn').addEventListener('click', () => {
  document.body.classList.toggle('dark');
});

document.getElementById('statsBtn').addEventListener('click', () => {
  const table = document.getElementById('statsTable');
  table.style.display = table.style.display === 'none' ? 'block' : 'none';
});

function updateStatsTable(){
  const tbody = document.getElementById('statsBody');
  tbody.innerHTML = '';
  let wins = 0;
  let losses = 0;
  let ties = 0;
  winHistory.forEach((h, idx) => {
    wins += h.win;
    losses += h.lose;
    ties += h.tie;
    const winRate = Math.round((wins / (idx + 1)) * 100);
    tbody.innerHTML += `<tr>
      <td>${idx + 1}</td>
      <td>${wins}</td>
      <td>${losses}</td>
      <td>${ties}</td>
      <td>${winRate}</td>
    </tr>`;
  });
}
</script>
</body>
</html>
